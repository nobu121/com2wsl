name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Windows (server)
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o com2wsl-windows-amd64.exe ./cmd/com2wsl

      - name: Build Linux (WSL client)
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o com2wsl-linux-amd64 ./cmd/com2wsl

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            com2wsl-windows-amd64.exe
            com2wsl-linux-amd64
